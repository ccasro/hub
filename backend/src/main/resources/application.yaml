booking:
  payment-hold-duration: 5m
  cancellation-min-hours-before: 24

iam:
  no-show-ban-threshold: 3
  no-show-ban-duration: 30d

matching:
  max-concurrent-matches: 2
  min-hours-before-creation: 48
  match-expiration-hours-before: 24
  organizer-payment-window: 30m
  cancellation-cooldown: 24h
  no-show-detection-window: 90m
  no-show-detection-job-delay: 15m
  leave-match-min-hours-before: 48
  check-in:
    radius-km: 0.2
    window-before-minutes: 30
    window-after-minutes: 30
    max-gps-accuracy-meters: 100.0

spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSL_MODE:disable}&prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER}

brevo:
  api:
    key: ${BREVO_API_KEY:dummy-key-for-local}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

auth0:
  audience: ${AUTH0_AUDIENCE}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

  endpoint:
    health:
      show-details: never

app:
  mail:
    from: ${APP_MAIL_FROM:noreply@padelhub.com}
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}