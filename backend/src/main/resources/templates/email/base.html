<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${subject}">SportsHub</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 16px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

                <!-- Header -->
                <tr>
                    <td style="background:linear-gradient(135deg,#18181b 0%,#111111 100%);border-radius:16px 16px 0 0;padding:32px 40px;border:1px solid #27272a;border-bottom:none;">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td>
                                        <span style="font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">
                                            ⚡ SportsHub
                                        </span>
                                </td>
                                <td align="right">
                                        <span th:if="${badgeText}" th:text="${badgeText}"
                                              style="display:inline-block;background-color:#7c3aed20;color:#a78bfa;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #7c3aed40;">
                                        </span>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Content -->
                <tr>
                    <td style="background-color:#18181b;padding:40px;border-left:1px solid #27272a;border-right:1px solid #27272a;">
                        <div th:replace="${contentFragment}"></div>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background-color:#111111;border-radius:0 0 16px 16px;padding:24px 40px;border:1px solid #27272a;border-top:1px solid #27272a40;">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td>
                                    <p style="margin:0;font-size:12px;color:#52525b;">
                                        © 2025 SportsHub · Reserva, Juega, Compite
                                    </p>
                                    <p style="margin:4px 0 0;font-size:11px;color:#3f3f46;">
                                        Has recibido este email porque tienes una cuenta en SportsHub.
                                    </p>
                                </td>
                                <td align="right">
                                    <a href="#" style="font-size:11px;color:#52525b;text-decoration:none;">Darse de baja</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
