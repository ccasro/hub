<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partido cancelado — SportsHub</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0a0a0a;padding:40px 16px;">
    <tr><td align="center">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

            <!-- Header -->
            <tr>
                <td style="background-color:#18181b;border-radius:16px 16px 0 0;padding:28px 40px;border:1px solid #27272a;border-bottom:none;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr>
                        <td><span style="font-size:20px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">⚡ SportsHub</span></td>
                        <td align="right"><span style="background-color:#ef444420;color:#f87171;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #ef444430;">❌ Partido cancelado</span></td>
                    </tr></table>
                </td>
            </tr>

            <!-- Body -->
            <tr>
                <td style="background-color:#18181b;padding:40px;border-left:1px solid #27272a;border-right:1px solid #27272a;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr><td align="center" style="padding-bottom:32px;">
                            <div style="display:inline-block;background-color:#ef444415;border:1px solid #ef444430;border-radius:50%;width:64px;height:64px;line-height:64px;text-align:center;font-size:28px;">❌</div>
                            <h1 style="margin:16px 0 8px;font-size:24px;font-weight:700;color:#ffffff;">Partido cancelado</h1>
                            <p style="margin:0;font-size:15px;color:#a1a1aa;" th:text="|Hola ${playerName}, el partido ha sido cancelado.|">El partido ha sido cancelado.</p>
                        </td></tr>
                    </table>
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#111111;border:1px solid #27272a;border-radius:12px;margin-bottom:24px;">
                        <tr><td style="padding:24px;">
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr><td style="padding-bottom:16px;border-bottom:1px solid #27272a40;">
                                    <p style="margin:0;font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:0.5px;">Pista</p>
                                    <p style="margin:4px 0 0;font-size:16px;font-weight:600;color:#ffffff;" th:text="${resourceName}">Pista 1</p>
                                    <p style="margin:2px 0 0;font-size:13px;color:#71717a;" th:text="${venueName}">Club Padel</p>
                                </td></tr>
                                <tr><td style="padding-top:16px;">
                                    <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr>
                                        <td width="50%">
                                            <p style="margin:0;font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:0.5px;">Fecha</p>
                                            <p style="margin:4px 0 0;font-size:15px;font-weight:600;color:#ffffff;" th:text="${bookingDate}">01/03/2026</p>
                                        </td>
                                        <td width="50%">
                                            <p style="margin:0;font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:0.5px;">Horario</p>
                                            <p style="margin:4px 0 0;font-size:15px;font-weight:600;color:#ffffff;" th:text="|${startTime} - ${endTime}|">17:00 — 18:30</p>
                                        </td>
                                    </tr></table>
                                </td></tr>
                            </table>
                        </td></tr>
                    </table>
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr><td align="center">
                            <a th:href="${searchUrl}" href="#"
                               style="display:inline-block;background-color:#7c3aed;color:#ffffff;font-size:14px;font-weight:600;padding:14px 32px;border-radius:10px;text-decoration:none;">
                                Buscar otro partido
                            </a>
                        </td></tr>
                    </table>
                </td>
            </tr>

            <!-- Footer -->
            <tr>
                <td style="background-color:#111111;border-radius:0 0 16px 16px;padding:20px 40px;border:1px solid #27272a;border-top:1px solid #27272a40;">
                    <p style="margin:0;font-size:12px;color:#52525b;text-align:center;">© 2025 SportsHub · Reserva, Juega, Compite</p>
                </td>
            </tr>

        </table>
    </td></tr>
</table>
</body>
</html>
