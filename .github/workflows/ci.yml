name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make mvnw executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Format check
        working-directory: backend
        run: ./mvnw -B spotless:check

      - name: Build and test
        working-directory: backend
        run: ./mvnw -B verify