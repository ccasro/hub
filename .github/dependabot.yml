version: 2

updates:

  # Backend - Maven dependencies
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    groups:
      spring:
        patterns:
          - "org.springframework*"

      flyway:
        patterns:
          - "org.flywaydb*"

      testcontainers:
        patterns:
          - "org.testcontainers*"

      logging:
        patterns:
          - "org.slf4j*"
          - "ch.qos.logback*"

      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

    commit-message:
      prefix: "deps"
      include: "scope"


  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    commit-message:
      prefix: "ci"

