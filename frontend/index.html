<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Auth0 Token Test</title>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>
<body>
<h2>Auth0 Token Test</h2>

<button id="login">Login</button>
<button id="getToken">Get Access Token</button>
<button id="logout">Logout</button>

<pre id="output"></pre>

<script>
    let auth0Client;

    async function init() {
      auth0Client = await auth0.createAuth0Client({
        domain: "dev-ccasro.eu.auth0.com",
        clientId: "uwNjN4oDPZyAhhS1n7UhamX7jEcsoQOP",
        authorizationParams: {
          audience: "https://api.hub.com",
          redirect_uri: "http://localhost:3000"
        }
      });

      // Si volvemos del login
      const query = window.location.search;
      if (query.includes("code=") && query.includes("state=")) {
        await auth0Client.handleRedirectCallback();
        window.history.replaceState({}, document.title, "/");
      }
    }

    document.getElementById("login").onclick = async () => {
      await auth0Client.loginWithRedirect();
    };

    document.getElementById("getToken").onclick = async () => {
      try {
        const token = await auth0Client.getTokenSilently();
        document.getElementById("output").innerText = token;
      } catch (e) {
        document.getElementById("output").innerText = "Error: " + e.message;
      }
    };

    document.getElementById("logout").onclick = async () => {
      auth0Client.logout({
        logoutParams: {
          returnTo: "http://localhost:3000"
        }
      });
    };

    init();
</script>
</body>
</html>
